<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Empower Humanity 2.0</title>
  <link rel="stylesheet" href="style.css">
</head>
<body>

<!-- TOP BAR -->
<div class="top-bar">
  <div class="column, left">
    <div>Tier: Seeker</div>
    <div><br><label for="indicator">Tier Progress: 60%</label><br></div>
    <br><progress id="indicator" max="100" value="60">60%</progress><br>
  </div>
  <div class="column, right">
    <div><span>PTLX Balance: 250</span></div>
    <button id="connectWalletBtn" alt="WalletConnect" class="button">Connect Wallet</button>
    <button id="walletBtn">
        <img src="assets/wallet-icon.png" alt="Wallet" class="wallet-icon">
    </button>
  </div>
</div>

<!-- WELCOME SCREEN -->
<div id="welcome" class="card">
  <h1>Welcome to Empower Humanity 2.0</h1>
  <p>Let EmpowerBot be your guide</p>
  <div><img src="assets/logo.jpg" alt="EH2 Logo" class="logo"></div>
  <button id="enterBtn">Enter</button>
  <div><button class="button" onclick="window.open('https://t.me/empower_testbot', '_blank')">EmpowerBot</button></div>
</div>

<!-- MODULE CAROUSEL -->
<div id="modules" class="hidden">

  <div id="carouselHeader">
    <button onclick="goHome()">← Home</button>
  </div>

  <div class="module active" data-module="stellarxpay">
    <h2>StellarXPAY</h2>
    <p>Fast, simple sovereign payments</p>
    <button class="moduleEnter">Enter</button>
  </div>

  <div class="module" data-module="empowerfix">
    <h2>EmpowerFiX</h2>
    <p>Automated asset optimization powered by PortalX</p>
    <button class="moduleEnter">Enter</button>
  </div>

  <div class="module" data-module="stellarverse">
    <h2>StellarVerse</h2>
    <p>Creative sovereign economy</p>
    <button class="moduleEnter">Enter</button>
  </div>

</div>

<!-- SUB MODULE ORBS -->
<div id="subModules" class="hidden"></div>

<!-- FOOTER MENU -->
<div id="footerMenu" class="footer">
  <div class="footer-item" data-menu="ptlx">PTLX Rewards</div>
  <div class="footer-item" data-menu="portalx">PortalX</div>
  <div class="footer-item" data-menu="vault">PortalX Vault</div>
</div>

<script src="src/wallet.js"></script>
<script src="app.js"></script>
</body>
</html>
